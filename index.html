<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YW Camp Meal Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f3f4f0;min-height:100vh;padding:20px}
.app{max-width:1000px;margin:0 auto;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.hdr{background:linear-gradient(135deg,#1B4332 0%,#2D6A4F 100%);color:#fff;padding:18px 24px;position:relative}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.hdr p{font-size:12px;opacity:.7;margin-top:4px;font-style:italic}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e5e7eb;overflow-x:auto}
.tab{padding:12px 20px;font-size:13px;cursor:pointer;color:#6b7280;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;font-family:Georgia,serif}
.tab.active{color:#1B4332;border-bottom-color:#1B4332;font-weight:700}
.tab:hover:not(.active){color:#374151;background:#f9fafb}
.content{padding:20px;min-height:400px}

/* Plan Tab */
.day-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
@media(max-width:700px){.day-grid{grid-template-columns:repeat(2,1fr)}}
.day-col{border-radius:9px;overflow:hidden;border:1px solid #e5e7eb}
.day-hdr{background:#1B4332;color:#fff;padding:9px 13px}
.day-hdr .d1{font-size:12px;font-weight:700}
.day-hdr .d2{font-size:11px;opacity:.7;margin-top:1px}
.day-body{background:#f9fafb;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.meal-card{border-radius:7px;padding:10px 11px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.meal-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.mc-breakfast{background:#fffbeb;border-color:#fde68a}
.mc-lunch{background:#eff6ff;border-color:#bfdbfe}
.mc-dinner{background:#f5f3ff;border-color:#ddd6fe}
.mc-breakfast.sel{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.mc-lunch.sel{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
.mc-dinner.sel{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.2)}
.mc-type{font-size:9px;font-weight:800;letter-spacing:.08em;margin-bottom:3px}
.mc-name{font-size:12px;font-weight:700;color:#111;margin-bottom:3px;line-height:1.3}
.mc-desc{font-size:10px;color:#6b7280;line-height:1.4;margin-bottom:6px}
.mc-footer{display:flex;justify-content:space-between;align-items:center;gap:4px}
.mc-cost{font-size:11px;font-weight:700}
.tags{display:flex;gap:3px;flex-wrap:wrap}
.tag{font-size:9px;padding:1px 5px;border-radius:8px;background:#dcfce7;color:#166534;white-space:nowrap}
.hint{font-size:11px;color:#9ca3af;text-align:center;padding:10px 0;font-style:italic}
.meal-placeholder{border-radius:7px;padding:10px 11px;border:2px dashed #e5e7eb;background:#f5f5f4;min-height:72px;opacity:0.45}
.drink-section{margin:10px 0 4px;padding:12px 14px;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.drink-lbl{font-size:11px;font-weight:700;color:#0369a1;white-space:nowrap;min-width:70px}
.drink-opts{display:flex;gap:8px;flex-wrap:wrap}
.drink-opt{font-size:12px;padding:5px 14px;border-radius:20px;border:1.5px solid #7dd3fc;background:#fff;cursor:pointer;transition:all .15s;color:#0369a1;font-family:Georgia,serif;white-space:nowrap}
.drink-opt:hover{border-color:#0284c7;background:#e0f2fe}
.drink-opt.on{background:#0284c7;border-color:#0284c7;color:#fff;font-weight:700}

/* Swap Panel */
.swap-panel{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:16px;margin-top:12px}
.swap-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.swap-hdr .swap-title{font-size:14px;font-weight:700;color:#1B4332}
.swap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px}
.swap-opt{border-radius:7px;padding:10px;cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;transition:all .15s;position:relative}
.swap-opt:hover{border-color:#2D6A4F;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.swap-opt.cur{border-color:#1B4332;background:#f0fdf4}
.cur-badge{display:inline-block;font-size:9px;background:#1B4332;color:#fff;padding:2px 6px;border-radius:3px;margin-bottom:5px;font-weight:700}
.swap-opt h4{font-size:11px;font-weight:700;color:#111;margin-bottom:3px;line-height:1.3}
.swap-opt p{font-size:10px;color:#6b7280;line-height:1.35;margin-bottom:5px}
.swap-opt .s-footer{display:flex;justify-content:space-between;align-items:center}
.swap-opt .s-cost{font-size:11px;font-weight:700;color:#1B4332}
.swap-opt .s-cook{font-size:9px;color:#9ca3af}
.close-btn{background:#1B4332;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:Georgia,serif}
.close-btn:hover{background:#2D6A4F}

/* Shopping Tab */
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.shop-note{font-size:12px;color:#6b7280;font-style:italic}
.shop-total{font-size:18px;font-weight:700;color:#1B4332}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1B4332;color:#fff;padding:7px 10px;text-align:left;font-size:11px;font-weight:700}
th.r,td.r{text-align:right}
tr:nth-child(even) td{background:#f9fafb}
td{padding:6px 10px;border-bottom:1px solid #f3f4f6;color:#374151}
.cat-row td{font-weight:700;font-size:11px;letter-spacing:.03em}
.total-row td{font-weight:700;color:#1B4332;background:#f0fdf4;border-top:2px solid #86efac;font-size:13px}

/* Prep Tab */
.prep-section{margin-bottom:14px}
.prep-day-hdr{background:#1B4332;color:#fff;padding:7px 14px;border-radius:7px 7px 0 0;font-size:12px;font-weight:700}
.prep-body{border:1px solid #e5e7eb;border-top:none;border-radius:0 0 7px 7px;overflow:hidden}
.prep-row{display:grid;grid-template-columns:90px 1fr;gap:12px;padding:8px 14px;border-bottom:1px solid #f3f4f6}
.prep-row:last-child{border-bottom:none}
.prep-row:nth-child(even){background:#f9fafb}
.prep-time{font-size:10px;font-weight:700;color:#1B4332;padding-top:1px}
.prep-task{font-size:11px;font-weight:600;color:#111;margin-bottom:2px}
.prep-tip{font-size:10px;color:#6b7280;font-style:italic;margin-bottom:2px}
.prep-meal-label{font-size:9px;color:#aaa}

/* Budget Tab */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
@media(max-width:500px){.stat-grid{grid-template-columns:1fr}}
.stat-card{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:14px 16px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:#1B4332}
.stat-lbl{font-size:11px;color:#6b7280;margin-top:3px}
.sec-lbl{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px;margin-top:16px}
.bar-row{display:grid;grid-template-columns:120px 1fr 70px;gap:10px;align-items:center;margin-bottom:7px}
.bar-wrap{background:#f3f4f6;border-radius:4px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar-lbl{font-size:12px;color:#374151}
.bar-val{font-size:12px;font-weight:700;color:#111;text-align:right}
.meal-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6;gap:8px}
.meal-row:last-child{border-bottom:none}
.meal-row-lbl{font-size:11px;color:#6b7280;min-width:75px}
.meal-row-name{font-size:12px;color:#111;flex:1}
.meal-row-cost{font-size:12px;font-weight:700}

/* Heart / Dessert */
.heart-btn{position:absolute;top:14px;right:16px;background:none;border:none;cursor:pointer;font-size:22px;opacity:.35;transition:all .2s;line-height:1;padding:2px}
.heart-btn:hover{opacity:.7;transform:scale(1.18)}
.heart-btn.active{opacity:1;filter:drop-shadow(0 0 7px rgba(251,113,133,.9))}
.dessert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-top:4px}
.d-card{border-radius:10px;padding:14px;border:2px solid #fce7f3;background:#fff;cursor:pointer;transition:all .18s;position:relative}
.d-card:hover{border-color:#f9a8d4;transform:translateY(-2px);box-shadow:0 4px 14px rgba(244,114,182,.15)}
.d-card.on{border-color:#ec4899;background:#fdf2f8;box-shadow:0 0 0 3px rgba(236,72,153,.18)}
.d-badge{position:absolute;top:10px;right:10px;font-size:18px;line-height:1}
.d-name{font-size:13px;font-weight:700;color:#111;margin-bottom:5px;margin-right:26px;line-height:1.3}
.d-desc{font-size:11px;color:#6b7280;line-height:1.4;margin-bottom:8px}
.d-prep{font-size:10px;color:#9ca3af;line-height:1.4;margin-bottom:8px;font-style:italic}
.d-footer{display:flex;justify-content:space-between;align-items:center}
.d-cost{font-size:12px;font-weight:700;color:#be185d}
.d-cook{font-size:10px;color:#9ca3af}
.d-note{font-size:12px;color:#9ca3af;font-style:italic;margin-bottom:16px}
.d-summary{margin-top:16px;padding:12px 16px;background:#fdf2f8;border-radius:9px;border:1.5px solid #f9a8d4;display:flex;justify-content:space-between;align-items:center}

/* Passphrase gate */
#gate{position:fixed;inset:0;background:#1B4332;display:flex;align-items:center;justify-content:center;z-index:9999}
#gate-box{background:#fff;border-radius:14px;padding:36px 32px;width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
#gate-box h2{font-size:18px;color:#1B4332;margin-bottom:6px}
#gate-box p{font-size:12px;color:#6b7280;margin-bottom:20px}
#gate-input{width:100%;padding:10px 14px;font-size:14px;border:2px solid #e5e7eb;border-radius:8px;outline:none;font-family:Georgia,serif;text-align:center;letter-spacing:.05em}
#gate-input:focus{border-color:#1B4332}
#gate-btn{margin-top:12px;width:100%;padding:10px;background:#1B4332;color:#fff;border:none;border-radius:8px;font-size:14px;font-family:Georgia,serif;cursor:pointer;font-weight:700}
#gate-btn:hover{background:#2D6A4F}
#gate-err{margin-top:10px;font-size:12px;color:#dc2626;min-height:16px}
.gate-hidden{display:none!important}
</style>
</head>
<body>
<div id="gate">
  <div id="gate-box">
    <h2>Stake YW Camp</h2>
    <p>Meal Planner &nbsp;·&nbsp; Enter passphrase to continue</p>
    <input id="gate-input" type="password" placeholder="Passphrase" autocomplete="off">
    <button id="gate-btn">Unlock</button>
    <div id="gate-err"></div>
  </div>
</div>
<div class="app gate-hidden" id="main-app">
  <div class="hdr">
    <h1>Stake YW Camp — Meal Planner</h1>
    <p>June 29 – July 2 &nbsp;·&nbsp; 200 people &nbsp;·&nbsp; 8 meals &nbsp;·&nbsp; Click any meal card to swap it</p>
    <button class="heart-btn" id="heart-btn" onclick="setTab(tab==='desserts'?'plan':'desserts')" title="Desserts">🤍</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

'soft-serve':{name:'Soft Serve Ice Cream',desc:'Machine provided — just buy the mix bags (~60 servings each). Set up a cup/cone station.',cook:'Soft serve machine only',
  shopping:[
    {item:'Soft serve mix (60-serving bag)',qty:4,unit:'bags',uc:30.00,cat:'Desserts'},
    {item:'Waffle cones',qty:200,unit:'ct',uc:0.20,cat:'Desserts'},
    {item:'Sundae cups',qty:100,unit:'ct',uc:0.10,cat:'Desserts'},
    {item:'Sprinkles / toppings assortment',qty:1,unit:'set',uc:15.00,cat:'Desserts'},
  ],
  prep:'Chill mix bags ahead of time. Load into machine per manufacturer directions 30 min before service. Set up cup/cone/topping station alongside.'},
'cookie-bar':{name:'Cookie Bar',desc:'Costco chocolate chunk and variety cookies — set out and done, zero prep',cook:'No prep — grab and go',
  shopping:[
    {item:'Costco choc chunk cookies (2.5 lb bag)',qty:10,unit:'bags',uc:10.00,cat:'Desserts'},
    {item:'Costco assorted cookies (2.5 lb bag)',qty:5,unit:'bags',uc:10.00,cat:'Desserts'},
  ],
  prep:'Arrange cookies on platters or in baskets. Label varieties. Set out napkins alongside.'},
'chocolate-cake':{name:'Costco Chocolate Cake',desc:'Half-sheet chocolate cakes from Costco bakery — order at least 48 hrs ahead, serves ~48 each',cook:'No prep — order from Costco bakery',
  shopping:[
    {item:'Costco half-sheet chocolate cake',qty:5,unit:'cakes',uc:22.00,cat:'Desserts'},
  ],
  prep:'Order at least 48 hrs ahead from Costco bakery. Pre-slice each cake before service (~10×5 cuts per sheet). Keep refrigerated until 30 min before serving.'},
};

const CC={'Proteins':'#D85A30','Dairy & Eggs':'#1D9E75','Bread & Grains':'#378ADD','Pantry':'#BA7517','Produce':'#639922','Frozen':'#7F77DD','Other':'#888780','Desserts':'#db2777'};
const PREV={day1:'Pre-Camp',day2:'Day 1 (Mon Jun 29)',day3:'Day 2 (Tue Jun 30)',day4:'Day 3 (Wed Jul 1)'};
const DMAP={day1:'Day 1 (Mon Jun 29)',day2:'Day 2 (Tue Jun 30)',day3:'Day 3 (Wed Jul 1)',day4:'Day 4 (Thu Jul 2)'};

let sched={'day1-dinner':'taco-bar','day2-breakfast':'pancake-station','day2-lunch':'sandwich-bar','day2-dinner':'hawaiian-haystacks','day3-breakfast':'breakfast-burrito','day3-lunch':'teriyaki-bowl','day3-dinner':'pulled-pork','day4-breakfast':'muffins-yogurt'};
let tab='plan', swapping=null, dessertSel=new Set(), drinkSel=new Set();

function mc(id){return ML[id].shopping.reduce((s,i)=>s+i.qty*i.uc,0);}
function dc(id){return DESSERTS[id].shopping.reduce((s,i)=>s+i.qty*i.uc,0);}
function tot(){
  let t=Object.values(sched).reduce((s,id)=>s+mc(id),0);
  const n=Object.keys(sched).length;
  drinkSel.forEach(id=>{const d=DRINK_OPTIONS[id];t+=d.qty*n*d.uc;});
  dessertSel.forEach(id=>t+=dc(id));
  return t;
}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function fmtd(n){return '$'+(Math.round(n*100)/100).toFixed(2);}
function tm(t){const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 9999;let h=+m[1];if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return h*60+ +m[2];}

function render(){
  const budget=fmt(tot());
  const tbs=[{id:'plan',l:'Meal Plan'},{id:'shopping',l:'Shopping List'},{id:'prep',l:'Prep Schedule'},{id:'budget',l:`Budget (${budget})`}];
  document.getElementById('tabs').innerHTML=tbs.map(t=>`<button class="tab${t.id===tab&&tab!=='desserts'?' active':''}" onclick="setTab('${t.id}')">${t.l}</button>`).join('');
  const hb=document.getElementById('heart-btn');
  if(hb){hb.className='heart-btn'+(tab==='desserts'?' active':'');hb.textContent=tab==='desserts'?'💗':'🤍';}
  const c=document.getElementById('content');
  if(tab==='plan')c.innerHTML=renderPlan();
  else if(tab==='shopping')c.innerHTML=renderShopping();
  else if(tab==='prep')c.innerHTML=renderPrep();
  else if(tab==='desserts')c.innerHTML=renderDesserts();
  else c.innerHTML=renderBudget();
}

function setTab(t){tab=t;if(t!=='plan')swapping=null;render();}

function renderPlan(){
  const ALL_SLOTS=['breakfast','lunch','dinner'];
  let h='<div class="day-grid">';
  DAYS.forEach(day=>{
    h+=`<div class="day-col"><div class="day-hdr"><div class="d1">${day.label}</div><div class="d2">${day.date}</div></div><div class="day-body">`;
    ALL_SLOTS.forEach(slot=>{
      if(!day.slots.includes(slot)){
        h+=`<div class="meal-placeholder mc-${slot}"></div>`;
        return;
      }
      const key=`${day.id}-${slot}`;const id=sched[key];if(!id)return;
      const m=ML[id];const s=TS[m.type];const sel=swapping===key;
      h+=`<div class="meal-card mc-${m.type}${sel?' sel':''}" style="background:${s.bg};border-color:${sel?s.sel:s.bc}" onclick="pick('${key}')">
        <div class="mc-type" style="color:${s.tc}">${s.lbl}</div>
        <div class="mc-name">${m.name}</div>
        <div class="mc-desc">${m.desc}</div>
        <div class="mc-footer">
          <div class="tags">${m.tags.slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <span class="mc-cost" style="color:${s.tc}">${fmt(mc(id))}</span>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  h+='</div>';
  const drinkLabels=Array.from(drinkSel).map(id=>DRINK_OPTIONS[id].name).join(', ');
  h+=`<div class="drink-section">
    <span class="drink-lbl">💧 Drink Mix</span>
    <div class="drink-opts">${Object.entries(DRINK_OPTIONS).map(([id,d])=>`<button class="drink-opt${drinkSel.has(id)?' on':''}" onclick="toggleDrink('${id}')">${d.icon} ${d.name}</button>`).join('')}</div>
    ${drinkSel.size===0?'<span style="font-size:11px;color:#9ca3af;font-style:italic">None selected — pick one or more</span>':''}
  </div>`;
  if(swapping){
    const [dayId,slot]=swapping.split('-');const curId=sched[swapping];
    const mtype=ML[curId].type;const day=DAYS.find(d=>d.id===dayId);
    const opts=Object.entries(ML).filter(([,m])=>m.type===mtype);
    h+=`<div class="swap-panel"><div class="swap-hdr"><span class="swap-title">Swap ${slot.charAt(0).toUpperCase()+slot.slice(1)} on ${day?.date}</span><button class="close-btn" onclick="closeSwap()">Close</button></div><div class="swap-grid">`;
    opts.forEach(([id,m])=>{
      const cur=id===curId;
      h+=`<div class="swap-opt${cur?' cur':''}" onclick="doSwap('${swapping}','${id}')">
        ${cur?'<div class="cur-badge">current</div>':''}
        <h4>${m.name}</h4><p>${m.desc}</p>
        <div class="s-footer"><span class="s-cost">${fmt(mc(id))}</span><span class="s-cook">${m.cook}</span></div>
      </div>`;
    });
    h+=`</div></div>`;
  } else {
    h+='<div class="hint">Click any meal card to swap it — the shopping list, prep schedule, and budget update automatically</div>';
  }
  return h;
}

function pick(key){swapping=swapping===key?null:key;render();}
function closeSwap(){swapping=null;render();}
function doSwap(key,id){sched[key]=id;swapping=null;render();}

function renderDesserts(){
  let h=`<div style="margin-bottom:18px"><p style="font-size:15px;font-weight:700;color:#be185d;margin-bottom:4px">🍰 Dessert Menu</p><p class="d-note">Click a card to add it to the shopping list and budget. Click again to remove it.</p></div>`;
  h+='<div class="dessert-grid">';
  Object.entries(DESSERTS).forEach(([id,d])=>{
    const on=dessertSel.has(id);
    h+=`<div class="d-card${on?' on':''}" onclick="toggleDessert('${id}')">
      <div class="d-badge">${on?'💗':'🤍'}</div>
      <div class="d-name">${d.name}</div>
      <div class="d-desc">${d.desc}</div>
      <div class="d-prep">${d.prep}</div>
      <div class="d-footer"><span class="d-cost">${fmt(dc(id))}</span><span class="d-cook">${d.cook}</span></div>
    </div>`;
  });
  h+='</div>';
  if(dessertSel.size>0){
    const dtot=Array.from(dessertSel).reduce((s,id)=>s+dc(id),0);
    h+=`<div class="d-summary"><span style="font-size:12px;color:#be185d;font-weight:700">${dessertSel.size} dessert${dessertSel.size>1?'s':''} selected — included in shopping list &amp; budget</span><span style="font-size:16px;font-weight:700;color:#be185d">${fmt(dtot)}</span></div>`;
  }
  return h;
}
function toggleDessert(id){if(dessertSel.has(id))dessertSel.delete(id);else dessertSel.add(id);render();}
function toggleDrink(id){if(drinkSel.has(id))drinkSel.delete(id);else drinkSel.add(id);render();}

function renderShopping(){
  const map={};
  Object.values(sched).forEach(id=>ML[id].shopping.forEach(s=>{
    const k=s.item+'||'+s.unit;
    if(map[k]){map[k].qty+=s.qty;map[k].total+=s.qty*s.uc;}
    else map[k]={...s,total:s.qty*s.uc};
  }));
  const mealCount=Object.keys(sched).length;
  drinkSel.forEach(id=>{
    const d=DRINK_OPTIONS[id];
    const k=d.item+'||'+d.unit;
    const totalQty=d.qty*mealCount;
    map[k]={...d,qty:totalQty,total:totalQty*d.uc};
  });
  dessertSel.forEach(id=>DESSERTS[id].shopping.forEach(s=>{
    const k=s.item+'||'+s.unit;
    if(map[k]){map[k].qty+=s.qty;map[k].total+=s.qty*s.uc;}
    else map[k]={...s,total:s.qty*s.uc};
  }));
  const byCat={};
  Object.values(map).forEach(i=>{if(!byCat[i.cat])byCat[i.cat]=[];byCat[i.cat].push(i);});
  const grand=Object.values(map).reduce((s,i)=>s+i.total,0);
  let h=`<div class="shop-header"><span class="shop-note">200 people · Sam's Club & Costco pricing · ~10% buffer included</span><span class="shop-total">${fmt(grand)} estimated</span></div>`;
  h+='<table><thead><tr><th>Item</th><th class="r">Qty</th><th>Unit</th><th class="r">Unit price</th><th class="r">Subtotal</th></tr></thead><tbody>';
  Object.entries(byCat).forEach(([cat,items])=>{
    const ct=items.reduce((s,i)=>s+i.total,0);
    const clr=CC[cat]||'#888';
    h+=`<tr class="cat-row"><td colspan="4" style="background:${clr}18;color:${clr}">${cat}</td><td class="r" style="background:${clr}18;color:${clr}">${fmt(ct)}</td></tr>`;
    items.sort((a,b)=>b.total-a.total).forEach(i=>{
      h+=`<tr><td>${i.item}</td><td class="r">${Math.round(i.qty*10)/10}</td><td>${i.unit}</td><td class="r">${fmtd(i.uc)}/${i.unit}</td><td class="r" style="font-weight:700">${fmt(i.total)}</td></tr>`;
    });
  });
  h+=`<tr class="total-row"><td colspan="4">Estimated Total</td><td class="r">${fmt(grand)}</td></tr></tbody></table>`;
  return h;
}

function renderPrep(){
  const byDay={'Pre-Camp':[
    {time:'Sat Jun 28',task:"Complete all shopping — Sam's Club & Costco",tip:'Proteins at Sam\'s; pork shoulder at Costco',meal:'Shopping'},
    {time:'Sat Jun 28',task:'Wash & prep produce, portion & label spice blends',tip:'Store in labeled zip bags in coolers',meal:'Prep'},
    {time:'Sun Jun 29',task:'Pack kitchen equipment, slow cookers, flat top gear',tip:'Inventory all serving tools and hotel pans',meal:'Prep'},
    {time:'Sun Jun 29',task:'Arrive at camp — unpack and set up kitchen',tip:'Identify oven locations, flat top power, hot water',meal:'Arrival'},
  ]};
  Object.values(DMAP).forEach(v=>byDay[v]=[]);
  byDay['Cleanup & Departure']=[
    {time:'Thu Jul 2',task:'Kitchen breakdown & cleanup',tip:'Dispose food waste, wipe flat top & ovens',meal:'Camp end'},
    {time:'Thu Jul 2',task:'Pack equipment & load vehicles',tip:'Label & return any borrowed equipment',meal:'Camp end'},
  ];
  Object.entries(sched).forEach(([key,id])=>{
    const [dayId]=key.split('-');const meal=ML[id];
    meal.prep.forEach(task=>{
      const target=task.when==='night-before'?(PREV[dayId]||'Pre-Camp'):DMAP[dayId];
      if(byDay[target])byDay[target].push({...task,meal:meal.name});
    });
  });
  Object.keys(byDay).forEach(d=>byDay[d].sort((a,b)=>tm(a.time)-tm(b.time)));
  let h='';
  Object.entries(byDay).filter(([,tasks])=>tasks.length).forEach(([day,tasks])=>{
    h+=`<div class="prep-section"><div class="prep-day-hdr">${day}</div><div class="prep-body">`;
    tasks.forEach((t,i)=>{
      h+=`<div class="prep-row" style="background:${i%2?'#f9fafb':'#fff'}">
        <div class="prep-time">${t.time}</div>
        <div><div class="prep-task">${t.task}</div>${t.tip?`<div class="prep-tip">${t.tip}</div>`:''}<div class="prep-meal-label">${t.meal}</div></div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

function renderBudget(){
  const byCat={};
  Object.values(sched).forEach(id=>ML[id].shopping.forEach(s=>{byCat[s.cat]=(byCat[s.cat]||0)+s.qty*s.uc;}));
  const n=Object.keys(sched).length;
  drinkSel.forEach(id=>{const d=DRINK_OPTIONS[id];byCat['Other']=(byCat['Other']||0)+d.qty*n*d.uc;});
  dessertSel.forEach(id=>DESSERTS[id].shopping.forEach(s=>{byCat[s.cat]=(byCat[s.cat]||0)+s.qty*s.uc;}));
  const total=Object.values(byCat).reduce((a,b)=>a+b,0);
  const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const maxC=sorted[0]?.[1]||1;
  const mealCosts=Object.entries(sched).map(([key,id])=>{
    const [dayId,slot]=key.split('-');const day=DAYS.find(d=>d.id===dayId);
    return {label:`${day?.label} ${slot}`,name:ML[id].name,cost:mc(id),type:ML[id].type};
  }).sort((a,b)=>b.cost-a.cost);

  let h=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-val">${fmt(total)}</div><div class="stat-lbl">Total estimated budget</div></div>
    <div class="stat-card"><div class="stat-val">${fmt(total/200)}</div><div class="stat-lbl">Per person (200 people)</div></div>
    <div class="stat-card"><div class="stat-val">${fmtd(total/Object.keys(sched).length/200)}</div><div class="stat-lbl">Per meal per person</div></div>
  </div>
  <div class="sec-lbl">By category</div>`;
  sorted.forEach(([cat,amt])=>{
    const clr=CC[cat]||'#888';
    h+=`<div class="bar-row"><span class="bar-lbl">${cat}</span><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(amt/maxC*100)}%;background:${clr}"></div></div><span class="bar-val">${fmt(amt)}</span></div>`;
  });
  h+='<div class="sec-lbl">By meal</div>';
  mealCosts.forEach(m=>{
    const s=TS[m.type];
    h+=`<div class="meal-row"><span class="meal-row-lbl">${m.label}</span><span class="meal-row-name">${m.name}</span><span class="meal-row-cost" style="color:${s.tc}">${fmt(m.cost)}</span></div>`;
  });
  return h;
}

render();

// Passphrase gate
(function(){
  const PASSPHRASE = 'nuWsYWrule';
  const gate = document.getElementById('gate');
  const app  = document.getElementById('main-app');
  const inp  = document.getElementById('gate-input');
  const btn  = document.getElementById('gate-btn');
  const err  = document.getElementById('gate-err');

  function unlock(){
    if(inp.value === PASSPHRASE){
      sessionStorage.setItem('yw-unlocked','1');
      gate.style.display='none';
      app.classList.remove('gate-hidden');
    } else {
      err.textContent='Incorrect passphrase — try again.';
      inp.value='';
      inp.focus();
    }
  }

  if(sessionStorage.getItem('yw-unlocked')==='1'){
    gate.style.display='none';
    app.classList.remove('gate-hidden');
  }

  btn.addEventListener('click', unlock);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') unlock(); });
  inp.focus();
})();
</script>
